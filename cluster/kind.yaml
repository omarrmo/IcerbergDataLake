kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: iceberg
# 1 control-plane + 2 workers. The control-plane node hosts ingress-nginx
# and exposes 80/443 on localhost via extraPortMappings.
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
