{{- if .Values.enabled.namespaces }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: db-credentials
  {{- include "platformApps.appMetadata" . | nindent 2 }}
  annotations:
    # Must exist before postgres + nessie sync (waves 0 / 5).
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: {{ .Values.project }}
  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: platform/db-credentials
    directory:
      recurse: false
  destination:
    server: {{ .Values.destinationServer }}
    namespace: {{ .Values.namespaces.platform }}
  {{- include "platformApps.syncPolicy" . | nindent 2 }}
{{- end }}
