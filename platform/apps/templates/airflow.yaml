{{- if .Values.enabled.airflow }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  {{- include "platformApps.appMetadata" . | nindent 2 }}
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: {{ .Values.project }}
  sources:
    - repoURL: https://airflow.apache.org
      chart: airflow
      targetRevision: {{ .Values.versions.airflow }}
      helm:
        valueFiles:
          - $values/platform/airflow/values.yaml
        parameters:
          - name: dags.gitSync.repo
            value: {{ .Values.repoURL }}
          - name: dags.gitSync.branch
            value: {{ .Values.targetRevision }}
          - name: ingress.web.host
            value: airflow.{{ .Values.ingressDomain }}
          # Belt-and-braces: explicitly disable the shared logs PVC. The chart
          # renders that PVC as ReadWriteMany, which Kind's local-path-provisioner
          # cannot satisfy; the airflow scheduler/webserver/triggerer pods would
          # then sit Pending forever. With this off the chart uses emptyDir for
          # logs and Airflow fetches worker logs over the worker_log_server.
          - name: logs.persistence.enabled
            value: "false"
    - repoURL: {{ .Values.repoURL }}
      targetRevision: {{ .Values.targetRevision }}
      ref: values
  destination:
    server: {{ .Values.destinationServer }}
    namespace: {{ .Values.namespaces.platform }}
  {{- include "platformApps.syncPolicy" . | nindent 2 }}
{{- end }}
