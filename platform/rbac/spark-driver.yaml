# Spark driver ServiceAccount. The Kubeflow Spark Operator chart auto-creates
# the matching Role + RoleBinding for this SA when `spark.serviceAccount.name`
# is set in the chart's values (see platform/spark-operator/values.yaml). We
# only own the ServiceAccount here so the two Argo Applications don't fight
# over the same Role/RoleBinding objects.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-driver
  namespace: mlops
