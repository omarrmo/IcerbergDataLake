# Spark driver ServiceAccount + Role. The driver creates/watches executor pods
# and reads the SparkApplication's bundled ConfigMaps. Avoids using the default
# SA, which has no permissions.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-driver
  namespace: mlops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver
  namespace: mlops
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "get", "list", "watch", "delete", "deletecollection", "patch"]
  - apiGroups: [""]
    resources: ["pods/log", "pods/exec"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "delete", "patch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver
  namespace: mlops
subjects:
  - kind: ServiceAccount
    name: spark-driver
    namespace: mlops
roleRef:
  kind: Role
  name: spark-driver
  apiGroup: rbac.authorization.k8s.io
