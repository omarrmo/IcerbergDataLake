# Shared Postgres credentials for the data-platform DB and its Nessie consumer.
#
# Why this exists:
#   * The Bitnami postgresql chart can either auto-generate a Secret with the
#     password (no `username` key) or read from an existing Secret.
#   * Project Nessie's chart needs ONE Secret with both `username` and
#     `password` keys.
#   * To satisfy both, we provide a single Secret here and reference it from
#     `auth.existingSecret` in postgres/values.yaml AND `jdbc.secret.name` in
#     nessie/values.yaml.
#
# Local-dev only password. Override per environment via SOPS / sealed-secrets /
# external-secrets. NEVER commit a real production password here.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: mlops
type: Opaque
stringData:
  username: nessie
  password: nessie-dev-password
  # Bitnami expects the superuser password under this key.
  postgres-password: change-me-superuser-dev
  # Convenience for tools that prefer either spelling.
  postgresql-password: nessie-dev-password
