# Nessie Helm chart values. Backs the Iceberg table catalog with Postgres.
# https://github.com/projectnessie/nessie/tree/main/helm/nessie
image:
  repository: ghcr.io/projectnessie/nessie
  tag: 0.107.5

replicaCount: 1

versionStoreType: JDBC2

# Connection details for the Bitnami Postgres chart. The chart was installed
# with fullnameOverride=postgres so its primary Service is `postgres`. The
# username/password are stored in the shared Secret `postgres-credentials`
# (see platform/db-credentials/secret.yaml) which is referenced by both this
# chart and the Bitnami postgresql chart's auth.existingSecret.
jdbc:
  jdbcUrl: jdbc:postgresql://postgres.mlops.svc.cluster.local:5432/nessie
  secret:
    name: postgres-credentials
    username: username
    password: password

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1
    memory: 1Gi

logLevel: INFO

# Authentication disabled for local dev; in real prod, enable OIDC.
authentication:
  enabled: false

# Expose Nessie via Ingress at nessie.localtest.me. Note the chart schema:
# `paths` is a list of plain strings, NOT a list of {path, pathType} objects;
# the path type is configured at the top level of `ingress.pathType`.
ingress:
  enabled: true
  className: nginx
  pathType: Prefix
  hosts:
    - host: nessie.localtest.me
      paths:
        - /

# Prometheus scraping (Nessie ships /q/metrics on the management port 9000)
managementService:
  portName: management
serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack
