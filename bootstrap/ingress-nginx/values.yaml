# ingress-nginx values for Kind: schedule on the control-plane node that has
# host ports 80/443 mapped, run as a single-replica DaemonSet-equivalent.
controller:
  kind: DaemonSet
  hostPort:
    enabled: true
  service:
    type: NodePort
  nodeSelector:
    ingress-ready: "true"
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Equal
      effect: NoSchedule
  publishService:
    enabled: false
  watchIngressWithoutClass: true
  ingressClassResource:
    default: true
  admissionWebhooks:
    enabled: true
  config:
    proxy-body-size: "0"
    use-forwarded-headers: "true"
