connector.name=iceberg

# Nessie-backed Iceberg catalog
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v2
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=s3://lakehouse/warehouse

# Use Trino's native S3 filesystem (recommended; hive.s3.* is legacy)
fs.hadoop.enabled=false
fs.native-s3.enabled=true

# MinIO (S3-compatible) connectivity
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.region=us-east-1

# Credentials (provided by docker-compose env)
s3.aws-access-key=${ENV:S3_ACCESS_KEY}
s3.aws-secret-key=${ENV:S3_SECRET_KEY}
