apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: mlops
spec:
  serviceName: postgresql
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgres
          image: postgres:15
          env:
            - name: POSTGRES_USER
              value: nessie
            - name: POSTGRES_PASSWORD
              value: nessie
            - name: POSTGRES_DB
              value: nessie
          ports:
            - containerPort: 5432