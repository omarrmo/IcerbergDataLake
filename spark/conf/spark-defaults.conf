## Spark + Iceberg + Nessie + MinIO (S3A) defaults
##
## This file is mounted into /opt/spark/conf/spark-defaults.conf in the container.
## It intentionally does NOT contain access/secret keys. Credentials are taken from
## AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY environment variables.

# Make sure dependency downloads work in the stock apache/spark image (no /home/spark)
spark.jars.ivy                                   /tmp/ivy

# Download dependencies automatically (spark-shell / spark-sql / spark-submit)
spark.jars.packages                              org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.6.1,org.projectnessie.nessie-integrations:nessie-spark-extensions-3.5_2.12:0.104.4,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262

# Enable Iceberg + Nessie Spark SQL extensions
spark.sql.extensions                             org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions,org.projectnessie.spark.extensions.NessieSparkSessionExtensions

# Iceberg catalog backed by Nessie
spark.sql.catalog.lake                           org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lake.catalog-impl              org.apache.iceberg.nessie.NessieCatalog
spark.sql.catalog.lake.uri                       http://nessie:19120/api/v2
spark.sql.catalog.lake.ref                       main
spark.sql.catalog.lake.warehouse                 s3a://lakehouse/warehouse

# MinIO (S3A) connectivity
spark.hadoop.fs.s3a.endpoint                     http://minio:9000
spark.hadoop.fs.s3a.path.style.access            true
spark.hadoop.fs.s3a.connection.ssl.enabled       false

# Pick up credentials from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
spark.hadoop.fs.s3a.aws.credentials.provider     com.amazonaws.auth.EnvironmentVariableCredentialsProvider

